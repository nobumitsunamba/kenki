<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>油圧ショベル操作シミュレーター</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #87b9e0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      -webkit-user-select: none; user-select: none;
      -webkit-touch-callout: none;
    }
    #app { position: fixed; inset: 0; }
    canvas { display: block; width: 100%; height: 100%; }

    /* バーチャルレバーのオーバーレイ */
    #controls {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      /* セーフエリア対応 */
      padding: 0 max(24px, env(safe-area-inset-left)) max(24px, env(safe-area-inset-bottom)) max(24px, env(safe-area-inset-right));
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      pointer-events: none; /* 個々のスティックだけ受ける */
      z-index: 10;
    }
    .stick {
      position: relative;
      width: 130px; height: 130px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.45);
      touch-action: none;
      pointer-events: auto;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }
    /* 走行スティックは小さめ・色分け */
    .stick.travel {
      width: 96px; height: 96px;
      align-self: center;
      background: rgba(255,200,80,0.14);
      border-color: rgba(255,210,120,0.6);
    }
    .stick.travel .knob {
      width: 44px; height: 44px;
      margin-left: -22px; margin-top: -22px;
      background: rgba(255,225,160,0.9);
    }
    .knob {
      position: absolute;
      left: 50%; top: 50%;
      width: 58px; height: 58px;
      margin-left: -29px; margin-top: -29px;
      border-radius: 50%;
      background: rgba(255,255,255,0.85);
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
      transition: background 0.1s;
    }
    .stick .label {
      position: absolute;
      left: 0; right: 0; top: -26px;
      text-align: center;
      color: #fff;
      font-size: 12px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.6);
      letter-spacing: 1px;
    }
    .stick .axis-hint {
      position: absolute;
      color: rgba(255,255,255,0.7);
      font-size: 10px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.6);
      pointer-events: none;
    }
    .axis-hint.top    { left:0; right:0; top:6px;    text-align:center; }
    .axis-hint.bottom { left:0; right:0; bottom:6px; text-align:center; }
    .axis-hint.left   { left:6px; top:50%; transform:translateY(-50%); }
    .axis-hint.right  { right:6px; top:50%; transform:translateY(-50%); }

    #title {
      position: fixed; top: 0; left: 0; right: 0;
      padding: max(10px, env(safe-area-inset-top)) 14px 4px;
      color: #fff; font-size: 13px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
      pointer-events: none; z-index: 10;
    }
    #hud {
      position: fixed;
      top: calc(max(10px, env(safe-area-inset-top)) + 24px);
      left: 14px;
      pointer-events: none; z-index: 10;
    }
    #loadLabel {
      color: #fff; font-size: 11px; margin-bottom: 3px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    }
    #loadBar {
      width: 140px; height: 12px;
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 6px; overflow: hidden;
      background: rgba(0,0,0,0.25);
    }
    #loadFill {
      width: 0%; height: 100%;
      background: linear-gradient(90deg, #c39a5e, #8a6233);
      transition: width 0.08s linear;
    }
  </style>

  <!-- Three.js を importmap で読み込む（ビルド不要） -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
  </script>
</head>
<body>
  <div id="app"></div>

  <div id="title">油圧ショベル操作シミュレーター（JISパターン）</div>

  <div id="hud">
    <div id="loadLabel">バケット土量</div>
    <div id="loadBar"><div id="loadFill"></div></div>
  </div>

  <div id="controls">
    <div class="stick" id="stickLeft">
      <div class="label">左レバー</div>
      <div class="axis-hint top">アーム伸</div>
      <div class="axis-hint bottom">アーム縮</div>
      <div class="axis-hint left">旋回左</div>
      <div class="axis-hint right">旋回右</div>
      <div class="knob" id="knobLeft"></div>
    </div>
    <div class="stick travel" id="stickTravel">
      <div class="label">走行</div>
      <div class="axis-hint top">前進</div>
      <div class="axis-hint bottom">後進</div>
      <div class="axis-hint left">左</div>
      <div class="axis-hint right">右</div>
      <div class="knob" id="knobTravel"></div>
    </div>
    <div class="stick" id="stickRight">
      <div class="label">右レバー</div>
      <div class="axis-hint top">ブーム下</div>
      <div class="axis-hint bottom">ブーム上</div>
      <div class="axis-hint left">バケット閉</div>
      <div class="axis-hint right">バケット開</div>
      <div class="knob" id="knobRight"></div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';

    // ===== 色定義 =====
    const COLOR_BODY   = 0x00A3AE; // コベルコ建機 ブルーグリーン（ロゴ背景の明るいティール）
    const COLOR_DARK   = 0x2b2f33; // 履帯 ダークグレー
    const COLOR_DARK2  = 0x3c4146; // やや明るいダークグレー
    const COLOR_CAB    = 0x33383d; // 運転席フレーム 濃いグレー
    const COLOR_GROUND = 0x9caa6f; // 地面

    // ===== レンダラ =====
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.05;
    document.getElementById('app').appendChild(renderer.domElement);

    // ===== シーン =====
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87b9e0);
    scene.fog = new THREE.Fog(0x87b9e0, 40, 115);

    // ===== カメラ（斜め見下ろし）=====
    const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 500);
    camera.position.set(9, 7, 12);
    camera.lookAt(0, 1.4, 0);

    // ===== ライト =====
    // 空(青)＋地面(土色)からの環境光で陰影に色味を持たせる
    const hemi = new THREE.HemisphereLight(0xbcd6f0, 0x5a5238, 0.85);
    scene.add(hemi);

    const ambient = new THREE.AmbientLight(0xffffff, 0.25);
    scene.add(ambient);

    const dir = new THREE.DirectionalLight(0xfff4e0, 1.15);
    dir.position.set(20, 35, 15);
    dir.castShadow = true;
    dir.shadow.mapSize.set(2048, 2048);
    dir.shadow.camera.near = 1;
    dir.shadow.camera.far = 120;
    dir.shadow.camera.left = -40;
    dir.shadow.camera.right = 40;
    dir.shadow.camera.top = 40;
    dir.shadow.camera.bottom = -40;
    dir.shadow.bias = -0.0004;
    dir.shadow.normalBias = 0.02;
    scene.add(dir);

    // 逆光側からの弱い補助光（影が真っ黒にならないように）
    const fill = new THREE.DirectionalLight(0xaac4e0, 0.3);
    fill.position.set(-18, 12, -20);
    scene.add(fill);

    // ===== 地面（土っぽい手続き的テクスチャ）=====
    function makeGroundTexture() {
      const S = 512;
      const cv = document.createElement('canvas');
      cv.width = cv.height = S;
      const ctx = cv.getContext('2d');
      // ベースの土色（黄土色）
      ctx.fillStyle = '#c2a24e';
      ctx.fillRect(0, 0, S, S);
      // ランダムな斑点で凹凸感
      for (let i = 0; i < 9000; i++) {
        const x = Math.random() * S, y = Math.random() * S;
        const r = Math.random() * 2.4 + 0.4;
        const shade = (Math.random() * 60 - 30) | 0;
        const base = 0xc2, g = 0xa2, b = 0x4e;
        ctx.fillStyle = `rgb(${base + shade}, ${g + shade}, ${b + shade})`;
        ctx.globalAlpha = 0.5;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      const tex = new THREE.CanvasTexture(cv);
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      tex.repeat.set(40, 40);
      tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }
    const groundTex = makeGroundTexture();
    // 遠景の地面（掘削エリアの外周〜地平線を埋める。掘れる面より深く沈めて
    // 掘った穴の底からは見えないようにする）。
    const farGround = new THREE.Mesh(
      new THREE.BoxGeometry(600, 1, 600),
      new THREE.MeshStandardMaterial({ map: groundTex, roughness: 1.0 })
    );
    farGround.position.y = -8.5; // 上面が y=-8
    farGround.receiveShadow = true;
    scene.add(farGround);

    // ===== 掘削できる地形（ハイトフィールド）=====
    // PlaneGeometry を XZ 平面に倒し、頂点の「高さ」を動的に変形させる。
    // 倒した後はローカルZが world+Y（高さ）方向、ローカル(x,y)→world(x,-z)。
    const FIELD_SIZE = 64;   // 一辺の長さ
    const FIELD_SEG  = 64;   // 分割数（頂点間隔=1.0）
    const FIELD_HW   = FIELD_SIZE / 2;
    const CELL       = FIELD_SIZE / FIELD_SEG;
    const DIG_MIN    = -3.2; // 掘れる深さ下限
    const PILE_MAX   = 3.0;  // 盛れる高さ上限

    const fieldGeo = new THREE.PlaneGeometry(FIELD_SIZE, FIELD_SIZE, FIELD_SEG, FIELD_SEG);
    fieldGeo.rotateX(-Math.PI / 2); // XZ平面へ。以後 position.y が高さになる。
    const vertCount = (FIELD_SEG + 1) * (FIELD_SEG + 1);
    // 頂点カラー（草=緑／掘削面・盛土=土色）
    const colAttr = new THREE.Float32BufferAttribute(new Float32Array(vertCount * 3), 3);
    fieldGeo.setAttribute('color', colAttr);

    // sRGB色をリニアに変換して保持（vertexColorsはリニア前提）
    const C_GRASS = new THREE.Color(0xc2a24e).convertSRGBToLinear(); // 表土（黄土色）
    const C_DIRT  = new THREE.Color(0x8a6a38).convertSRGBToLinear(); // 掘削面
    const C_DEEP  = new THREE.Color(0x5e4524).convertSRGBToLinear(); // 深部
    const C_PILE  = new THREE.Color(0xb89052).convertSRGBToLinear(); // 盛土（ほぐれた土）

    function setVertColor(idx, h) {
      let c;
      if (h > 0.04) {
        c = C_PILE;
      } else if (h < -0.04) {
        const t = Math.min(1, -h / 3);
        c = C_DIRT.clone().lerp(C_DEEP, t);
      } else {
        c = C_GRASS;
      }
      colAttr.setXYZ(idx, c.r, c.g, c.b);
    }
    for (let i = 0; i < vertCount; i++) setVertColor(i, 0);
    colAttr.needsUpdate = true;

    const field = new THREE.Mesh(
      fieldGeo,
      new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 1.0, metalness: 0.0 })
    );
    field.receiveShadow = true;
    field.castShadow = true;
    scene.add(field);

    const fieldPos = fieldGeo.attributes.position;
    // 高さの読み書き（world座標→頂点）。倒した後 position.y がそのまま高さ。
    function fieldIndex(wx, wz) {
      // PlaneGeometry頂点配列順: iy(行,上→下) × ix(列,左→右)
      // ローカル: x=wx, y=-wz。 x: -HW..HW, 元のy(=-wz): HW..-HW
      const ix = Math.round((wx + FIELD_HW) / CELL);
      const iy = Math.round((FIELD_HW - (-wz)) / CELL); // = (FIELD_HW + wz)/CELL
      if (ix < 0 || ix > FIELD_SEG || iy < 0 || iy > FIELD_SEG) return -1;
      return iy * (FIELD_SEG + 1) + ix;
    }
    function heightAtWorld(wx, wz) {
      const i = fieldIndex(wx, wz);
      return i < 0 ? 0 : fieldPos.getY(i);
    }

    // ===== マテリアル =====
    const matBody  = new THREE.MeshStandardMaterial({ color: COLOR_BODY,  roughness: 0.55, metalness: 0.25 });
    const matDark  = new THREE.MeshStandardMaterial({ color: COLOR_DARK,  roughness: 0.9,  metalness: 0.1 });
    const matDark2 = new THREE.MeshStandardMaterial({ color: COLOR_DARK2, roughness: 0.85, metalness: 0.1 });
    // 油圧シリンダーのロッド（クロムメッキ風の光る鋼）
    const matSteel = new THREE.MeshStandardMaterial({ color: 0xc9ccd2, roughness: 0.2, metalness: 0.9 });
    // シリンダーのバレル（ボディと同じブルーグリーン）
    const matBarrel = new THREE.MeshStandardMaterial({ color: COLOR_BODY, roughness: 0.5, metalness: 0.35 });
    // 運転席フレーム（濃いグレー）とガラス
    const matCab   = new THREE.MeshStandardMaterial({ color: COLOR_CAB, roughness: 0.5, metalness: 0.3 });
    const matGlass = new THREE.MeshStandardMaterial({ color: 0xbfe6f2, roughness: 0.12, metalness: 0.2, transparent: true, opacity: 0.55 });

    // テキストを描いたテクスチャ（看板用）。mirror=true で左右反転して描く
    // （背面向きに配置しても正しく読めるようにするため）。
    function makeTextTexture(text, bg, fg, mirror) {
      const cv = document.createElement('canvas');
      cv.width = 512; cv.height = 160;
      const ctx = cv.getContext('2d');
      if (bg) { ctx.fillStyle = bg; ctx.fillRect(0, 0, cv.width, cv.height); } // bg=null で透明
      if (mirror) { ctx.translate(cv.width, 0); ctx.scale(-1, 1); }
      ctx.fillStyle = fg;
      ctx.font = 'bold 110px Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, cv.width / 2, cv.height / 2 + 6);
      const tex = new THREE.CanvasTexture(cv);
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
      return tex;
    }

    // 影を落とす／受ける設定のヘルパ
    function mesh(geo, mat) {
      const m = new THREE.Mesh(geo, mat);
      m.castShadow = true;
      m.receiveShadow = true;
      return m;
    }

    // =========================================================
    //  関節の親子構造
    //  base
    //   └ swing (Y軸旋回)
    //       └ boom (X軸ピッチ)
    //           └ arm (X軸ピッチ)
    //               └ bucket (X軸ピッチ)
    //  各 Group の原点 = 関節の付け根（ピボット）。
    //  ジオメトリは原点からオフセットして配置する。
    // =========================================================

    // =========================================================
    //  寸法 (m) — コベルコ SK200 図面ベース。1ユニット=1m。
    // =========================================================
    const TRACK_HALF = 1.10;   // 左右クローラ中心(軌間2.2)
    const TRACK_LEN  = 4.17;   // クローラ全長
    const SHOE_W     = 0.6;    // シュー幅
    const TRACK_R    = 0.46;   // 起動輪/遊動輪半径(=クローラ高の半分)
    const TRACK_YC   = 0.46;   // クローラ中心高
    const ZEND       = TRACK_LEN / 2 - TRACK_R; // 端輪の中心z
    const SWING_Y    = 1.00;   // 旋回ベアリング上面の高さ

    // ----- ベース（下部走行体, 固定）-----
    const base = new THREE.Group();
    scene.add(base);

    function buildTrack(sx) {
      // 起動輪(後)・遊動輪(前)
      for (const sz of [-ZEND, ZEND]) {
        const w = mesh(new THREE.CylinderGeometry(TRACK_R, TRACK_R, SHOE_W * 1.05, 24), matDark2);
        w.rotation.z = Math.PI / 2; w.position.set(sx, TRACK_YC, sz); base.add(w);
        const hub = mesh(new THREE.CylinderGeometry(0.2, 0.2, SHOE_W * 1.12, 14), matDark);
        hub.rotation.z = Math.PI / 2; hub.position.set(sx, TRACK_YC, sz); base.add(hub);
      }
      // 下部転輪
      for (const sz of [-1.05, -0.35, 0.35, 1.05]) {
        const r = mesh(new THREE.CylinderGeometry(0.22, 0.22, SHOE_W * 1.02, 14), matDark);
        r.rotation.z = Math.PI / 2; r.position.set(sx, 0.22, sz); base.add(r);
      }
      // トラックフレーム(内側)
      const fr = mesh(new THREE.BoxGeometry(SHOE_W * 0.7, 0.5, TRACK_LEN - 0.7), matDark2);
      fr.position.set(sx, TRACK_YC, 0); base.add(fr);
    }
    buildTrack(-TRACK_HALF);
    buildTrack(TRACK_HALF);

    // 履板（グローサ）— 履帯外周に沿って等間隔配置
    function addTrackShoes(sx) {
      const shoeGeo = new THREE.BoxGeometry(SHOE_W * 1.05, 0.1, 0.34);
      const lugGeo  = new THREE.BoxGeometry(SHOE_W * 0.95, 0.07, 0.1);
      const N = 9;
      const place = (y, z, rot) => {
        const shoe = mesh(shoeGeo, matDark);
        shoe.position.set(sx, y, z); shoe.rotation.x = rot; base.add(shoe);
        const lug = mesh(lugGeo, matDark2);
        lug.position.set(sx, y - Math.cos(rot) * 0.08, z + Math.sin(rot) * 0.08);
        lug.rotation.x = rot; base.add(lug);
      };
      for (let i = 0; i < N; i++) { const z = -ZEND + (2 * ZEND) * (i / (N - 1)); place(TRACK_YC + TRACK_R, z, 0); }
      for (let i = 0; i < N; i++) { const z = -ZEND + (2 * ZEND) * (i / (N - 1)); place(TRACK_YC - TRACK_R, z, Math.PI); }
      const arc = 6;
      for (const [zc, dir] of [[ZEND, 1], [-ZEND, -1]]) {
        for (let i = 1; i < arc; i++) {
          const a = -Math.PI / 2 + Math.PI * (i / arc);
          const y = TRACK_YC + TRACK_R * Math.cos(a);
          const z = zc + dir * TRACK_R * Math.sin(a);
          place(y, z, dir * a + (dir < 0 ? Math.PI : 0));
        }
      }
    }
    addTrackShoes(-TRACK_HALF);
    addTrackShoes(TRACK_HALF);

    // カーボディ(下部中央フレーム)＋旋回ベアリング
    const carbody = mesh(new THREE.BoxGeometry(1.7, 0.55, 2.6), matDark2);
    carbody.position.set(0, 0.7, 0);
    base.add(carbody);
    const swingBearing = mesh(new THREE.CylinderGeometry(0.95, 0.95, 0.32, 28), matDark);
    swingBearing.position.set(0, SWING_Y - 0.16, 0);
    base.add(swingBearing);

    // ----- 上部旋回体（Y軸で旋回）-----
    // ローカル原点は旋回ベアリング上面(地上 SWING_Y)。後端 z=-2.91(R2910)。
    const swing = new THREE.Group();
    swing.position.set(0, SWING_Y, 0);
    base.add(swing);

    // 旋回テーブル
    const turntable = mesh(new THREE.CylinderGeometry(1.15, 1.15, 0.16, 28), matDark2);
    turntable.position.set(0, 0.08, 0);
    swing.add(turntable);

    // メインデッキ
    const deck = mesh(new THREE.BoxGeometry(2.6, 0.32, 4.2), matBody);
    deck.position.set(0, 0.26, -0.7);
    swing.add(deck);

    // エンジンフード(後部) — キャブより低く
    const hood = mesh(new THREE.BoxGeometry(2.45, 0.8, 2.2), matBody);
    hood.position.set(0.05, 0.78, -1.35);
    swing.add(hood);

    // カウンターウェイト（最後部, R2.91）
    const counter = mesh(new THREE.BoxGeometry(2.45, 1.2, 0.8), matBody);
    counter.position.set(0, 0.68, -2.5);
    swing.add(counter);

    // お尻に KOBELCO の銘板（地=ボディカラー / 文字=白）
    const kobeTex = makeTextTexture('KOBELCO', '#00A3AE', '#ffffff', false);
    const nameplate = new THREE.Mesh(
      new THREE.PlaneGeometry(2.0, 0.6),
      new THREE.MeshStandardMaterial({ map: kobeTex, roughness: 0.6, side: THREE.DoubleSide })
    );
    nameplate.position.set(0, 0.85, -2.905); // カウンターウェイト背面
    nameplate.rotation.y = Math.PI;          // -Z を向く
    swing.add(nameplate);

    // オペレータキャブ（左前）: 濃いグレーのフレームに大きなガラス。天端=地上2.98。
    const cab = mesh(new THREE.BoxGeometry(1.02, 1.56, 1.8), matCab);
    cab.position.set(0.79, 1.20, 0.6);
    swing.add(cab);
    // 前面ガラス（大きめ）
    const glassFront = mesh(new THREE.BoxGeometry(0.86, 1.1, 0.05), matGlass);
    glassFront.position.set(0.79, 1.4, 0.6 + 0.9 + 0.01);
    swing.add(glassFront);
    // 外側側面ガラス（大きめ）
    const glassSide = mesh(new THREE.BoxGeometry(0.05, 1.1, 1.5), matGlass);
    glassSide.position.set(0.79 + 0.51 + 0.01, 1.4, 0.6);
    swing.add(glassSide);
    // 後方側ガラス
    const glassRear = mesh(new THREE.BoxGeometry(0.78, 0.9, 0.05), matGlass);
    glassRear.position.set(0.79, 1.35, 0.6 - 0.9 - 0.01);
    swing.add(glassRear);

    // 排気筒
    const stack = mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.55, 12), matDark);
    stack.position.set(-0.7, 1.6, -1.35);
    swing.add(stack);

    // ブームの取り付け基部（前方中央やや左＝キャブと反対側）— ここがブームのピボット
    const BOOM_PIVOT = new THREE.Vector3(-0.45, 0.55, 1.45);
    const BOOM_LEN = 5.68; // ブーム長
    const ARM_LEN = 2.94;  // アーム長(図面記載)
    // ブームフット（ブームピボットの台座）＋ブームシリンダー下部の取付ラグ
    const boomFoot = mesh(new THREE.BoxGeometry(1.1, 0.95, 0.85), matBody);
    boomFoot.position.set(-0.45, 0.45, 1.35);
    swing.add(boomFoot);
    // ブームシリンダー下部の取付ブラケット（前方・左右）
    for (const sgn of [-1, 1]) {
      const lug = mesh(new THREE.BoxGeometry(0.18, 0.5, 0.45), matBody);
      lug.position.set(-0.45 + sgn * 0.36, 0.12, 1.72);
      swing.add(lug);
    }

    // 側面プロファイル(z,y の点列)を幅(width)方向へ押し出して梁を作る。
    // 角は軽くベベルして量産機らしい丸みを出す。
    function beamGeo(points, width) {
      const sh = new THREE.Shape();
      sh.moveTo(points[0][0], points[0][1]);
      for (let i = 1; i < points.length; i++) sh.lineTo(points[i][0], points[i][1]);
      sh.closePath();
      const g = new THREE.ExtrudeGeometry(sh, {
        depth: width, bevelEnabled: true,
        bevelThickness: 0.05, bevelSize: 0.05, bevelSegments: 1,
      });
      g.rotateY(-Math.PI / 2);     // 厚みをX方向へ
      g.translate(width / 2, 0, 0);// X中心に寄せる
      g.computeVertexNormals();
      return g;
    }
    // 上端・下端の2本のポリラインから閉プロファイルを作る
    function beamProfile(samples) {
      const top = [], bot = [];
      for (const [z, cy, half] of samples) { top.push([z, cy + half]); bot.push([z, cy - half]); }
      return top.concat(bot.reverse());
    }

    // ----- ブーム（X軸ピッチ）-----
    const boom = new THREE.Group();
    boom.position.copy(BOOM_PIVOT);
    swing.add(boom);

    // ブーム本体: 「へ字」に反り、根元→先で薄くなるテーパー梁。
    // 反り cy = 中央が上, 厚み half = 根元厚め。両端は z 軸上(cy=0)でピボット/先端に一致。
    const BOOM_CURVE = 0.88;
    const boomCenterY = (z) => BOOM_CURVE * Math.sin(Math.PI * z / BOOM_LEN);
    const boomHalf    = (z) => 0.22 + 0.22 * Math.sin(Math.PI * z / BOOM_LEN); // 中央が太く端が細い
    {
      const N = 12, samples = [];
      for (let i = 0; i <= N; i++) {
        const z = (i / N) * BOOM_LEN;
        samples.push([z, boomCenterY(z), boomHalf(z)]);
      }
      const boomMeshObj = mesh(beamGeo(beamProfile(samples), 0.5), matBody);
      boom.add(boomMeshObj);
    }

    // ブーム両側面の KOBELCO 白文字（写真準拠・先端寄り・縮小）
    {
      const tz = 4.1, ty = boomCenterY(4.1);
      // 両側面とも鏡像描画にすると正立する
      const tex = makeTextTexture('KOBELCO', null, '#ffffff', true);
      const mat = () => new THREE.MeshStandardMaterial({ map: tex, transparent: true, roughness: 0.6 });
      const txtR = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 0.4), mat());
      txtR.position.set(0.31, ty, tz); txtR.rotation.y = Math.PI / 2; boom.add(txtR);
      const txtL = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 0.4), mat());
      txtL.position.set(-0.31, ty, tz); txtL.rotation.y = -Math.PI / 2; boom.add(txtL);
    }

    // ブームのピボット軸（シリンダー, 横向き）
    const boomPin = mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.64, 16), matBody);
    boomPin.rotation.z = Math.PI / 2;
    boom.add(boomPin);

    // ブーム上面のアームシリンダー取付ブラケット（反った上面に乗せる）
    const boomBktZ = 3.6;
    const boomBkt = mesh(new THREE.BoxGeometry(0.4, 0.45, 0.7), matBody);
    boomBkt.position.set(0, boomCenterY(boomBktZ) + boomHalf(boomBktZ) + 0.05, boomBktZ);
    boom.add(boomBkt);
    // ブームシリンダー上端の取付ブラケット（下面・左右）
    for (const sgn of [-1, 1]) {
      const bcb = mesh(new THREE.BoxGeometry(0.16, 0.4, 0.5), matBody);
      bcb.position.set(sgn * 0.28, boomCenterY(2.5) - boomHalf(2.5) + 0.05, 2.5);
      boom.add(bcb);
    }


    // ----- アーム（X軸ピッチ）-----
    // ブーム先端がアームのピボット。
    const arm = new THREE.Group();
    arm.position.set(0, 0, BOOM_LEN); // ブーム先端
    boom.add(arm);

    const armHalf = (z) => 0.36 - 0.24 * (z / ARM_LEN);
    {
      const N = 8, samples = [];
      for (let i = 0; i <= N; i++) {
        const z = (i / N) * ARM_LEN;
        samples.push([z, 0, armHalf(z)]);
      }
      const armMeshObj = mesh(beamGeo(beamProfile(samples), 0.38), matBody);
      arm.add(armMeshObj);
    }

    const armPin = mesh(new THREE.CylinderGeometry(0.26, 0.26, 0.5, 16), matBody);
    armPin.rotation.z = Math.PI / 2;
    arm.add(armPin);

    // アーム基部のヒール: アーム本体をピボットを越えてブーム側(-z)へ水平気味に
    // 伸ばしたレバー。丸み(R)のある上面を持ち、後端(ブーム根元側)の頂点に
    // アームシリンダーが付く（赤スケッチの向き）。
    function makeArmHeel() {
      const sh = new THREE.Shape();
      sh.moveTo(0.15, 0.32);   // 前上(アーム上面・先端側)
      sh.lineTo(0.15, -0.30);  // 前下(アーム下面)
      sh.lineTo(-0.30, -0.16); // 後下
      sh.lineTo(-0.62, 0.14);  // 後端 下(ブーム側)
      sh.lineTo(-0.58, 0.34);  // 後端 R(丸み)
      sh.lineTo(-0.05, 0.42);  // 上面を前へ
      sh.closePath();
      const g = new THREE.ExtrudeGeometry(sh, {
        depth: 0.4, bevelEnabled: true, bevelThickness: 0.04, bevelSize: 0.04, bevelSegments: 1,
      });
      g.rotateY(-Math.PI / 2);
      g.translate(0.2, 0, 0); // X中心へ
      g.computeVertexNormals();
      return g;
    }
    const armHeelMesh = mesh(makeArmHeel(), matBody);
    arm.add(armHeelMesh);
    // シリンダー取付ピン（ヒール後端＝ブーム根元側）= アームシリンダーの取付点
    const heelPin = mesh(new THREE.CylinderGeometry(0.09, 0.09, 0.5, 12), matDark);
    heelPin.rotation.z = Math.PI / 2;
    heelPin.position.set(0, 0.24, -0.55);
    arm.add(heelPin);

    // アーム上面のバケットシリンダー取付ブラケット（アームに接する低い位置）
    const armBkt = mesh(new THREE.BoxGeometry(0.3, 0.28, 0.5), matBody);
    armBkt.position.set(0, 0.3, 0.95);
    arm.add(armBkt);

    // アーム先端の継手（ナックル）— ここがバケットのピボット。さらに細く。
    const armTip = mesh(new THREE.BoxGeometry(0.42, 0.38, 0.38), matBody);
    armTip.position.set(0, 0, ARM_LEN);
    arm.add(armTip);

    // ----- バケット（X軸ピッチで開閉）-----
    // アーム先端(ナックル)がバケットのピボット。
    // ピボットを上端(腕との連結点)に置き、本体はすべてピボットより下に吊る。
    const bucket = new THREE.Group();
    bucket.position.set(0, 0, ARM_LEN); // アーム先端
    arm.add(bucket);

    const bucketPin = mesh(new THREE.CylinderGeometry(0.22, 0.22, 0.7, 16), matBody);
    bucketPin.rotation.z = Math.PI / 2;
    bucket.add(bucketPin);

    // バケット形状: 背板＋底板＋側板2枚（ブルーグリーン, 幅≈0.9m）
    // くぼみ(開口)は機体側=-Z を向く。背板は腕側=+Z。上端=ピボット。
    const bucketMat = matBody;
    const back = mesh(new THREE.BoxGeometry(0.9, 0.92, 0.14), bucketMat);
    back.position.set(0, -0.42, 0.12);
    bucket.add(back);

    const bottom = mesh(new THREE.BoxGeometry(0.9, 0.14, 0.88), bucketMat);
    bottom.position.set(0, -0.82, -0.32);
    bottom.rotation.x = 0.2;
    bucket.add(bottom);

    // 側板: くぼみ側面を三角形の板で塞ぐ（背板〜底板〜開口の対角線）
    // 形状は側面視の (z, y) で定義。A=上端(ピボット側) B=背下 C=刃先側。
    function makeBucketSideGeo() {
      const sh = new THREE.Shape();
      sh.moveTo(0.15, 0.0);     // A: 背板上端（ピボット付近）
      sh.lineTo(0.15, -0.88);   // B: 背板下端
      sh.lineTo(-0.78, -0.82);  // C: 刃先側下端
      sh.closePath();
      const g = new THREE.ExtrudeGeometry(sh, { depth: 0.12, bevelEnabled: false });
      g.rotateY(-Math.PI / 2); // 厚みをX方向へ
      g.translate(0.06, 0, 0); // 厚み中心を合わせる
      g.computeVertexNormals();
      return g;
    }
    const bucketSideGeo = makeBucketSideGeo();
    for (const sx of [-0.4, 0.4]) {
      const side = mesh(bucketSideGeo, bucketMat);
      side.position.x = sx;
      bucket.add(side);
    }
    // 刃先（ツース風）— 機体側(-Z)の開口の縁
    for (let i = -1; i <= 1; i++) {
      const tooth = mesh(new THREE.BoxGeometry(0.16, 0.14, 0.34), matDark2);
      tooth.position.set(i * 0.3, -0.8, -0.76);
      tooth.rotation.x = 0.2;
      bucket.add(tooth);
    }

    // 掘削判定用の刃先アンカー（ツースの先端あたり, -Z側）
    const bucketTip = new THREE.Object3D();
    bucketTip.position.set(0, -0.86, -0.92);
    bucket.add(bucketTip);

    // バケット内の土（積載量に応じて表示・スケール）
    const matSoil = new THREE.MeshStandardMaterial({ color: 0x6f5337, roughness: 1.0 });
    const soilInBucket = mesh(new THREE.BoxGeometry(0.82, 0.6, 0.7), matSoil);
    soilInBucket.position.set(0, -0.5, -0.28);
    soilInBucket.visible = false;
    bucket.add(soilInBucket);

    // =========================================================
    //  H型リンク（バケットシリンダー → バケット）
    //  idlerAnchor(アーム固定) と bucketLug(バケット固定) を、長さ固定の
    //  2本のリンク(アイドラ/パワー)で linkNode に結合する四節リンク。
    //  linkNode にバケットシリンダーのロッド端が付く。
    // =========================================================
    const idlerAnchor = new THREE.Object3D();
    idlerAnchor.position.set(0, 0.1, ARM_LEN - 0.35);
    arm.add(idlerAnchor);
    // アーム側面のアイドラリンク取付ピン（横向き円柱・左右に貫通）
    const idlerPin = mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.56, 12), matDark);
    idlerPin.rotation.z = Math.PI / 2;
    idlerPin.position.copy(idlerAnchor.position);
    arm.add(idlerPin);

    const bucketLug = new THREE.Object3D();
    bucketLug.position.set(0, -0.2, 0.42); // 三角ガセットの頂点＝パワーリンクのピン
    bucket.add(bucketLug);
    // バケット背面の三角ガセット（1.5倍に拡大）。頂点にリンクを取り付ける。
    function makeLugGusset() {
      const sh = new THREE.Shape();
      sh.moveTo(0.08, 0.05);  // 背側 上
      sh.lineTo(0.08, -0.85); // 背側 下
      sh.lineTo(0.42, -0.2);  // 頂点（ピン位置・突出）
      sh.closePath();
      const g = new THREE.ExtrudeGeometry(sh, { depth: 0.08, bevelEnabled: false });
      g.rotateY(-Math.PI / 2);
      g.translate(0.04, 0, 0);
      g.computeVertexNormals();
      return g;
    }
    const lugGeo = makeLugGusset();
    for (const sx of [-0.2, 0.2]) {
      const ear = mesh(lugGeo, matBody);
      ear.position.x = sx;
      bucket.add(ear);
    }
    // 頂点を左右に貫通するピン
    const lugPin = mesh(new THREE.CylinderGeometry(0.07, 0.07, 0.5, 12), matDark);
    lugPin.rotation.z = Math.PI / 2;
    lugPin.position.set(0, -0.2, 0.42);
    bucket.add(lugPin);

    const linkNode = new THREE.Object3D(); // ロッド端＝2リンクの結節点(scene座標)
    scene.add(linkNode);

    // リンクのバー（左右2本ずつで「H」に見せる）
    const linkBars = [];
    function addLinkPair() {
      const a = mesh(new THREE.CylinderGeometry(0.05, 0.05, 1, 10), matBody);
      const b = mesh(new THREE.CylinderGeometry(0.05, 0.05, 1, 10), matBody);
      scene.add(a, b);
      return [a, b];
    }
    const idlerBars = addLinkPair(); // idlerAnchor → node（左右）
    const powerBars = addLinkPair(); // bucketLug  → node（左右）
    const LINK_HALF = 0.24;          // 左右リンクのXオフセット(アーム側面の外側)

    // =========================================================
    //  油圧シリンダー（関節連動でロッドが伸縮）
    //  2点(アンカー)の間を、固定長のバレル＋スライドするロッドで繋ぐ。
    //  各フレームでアンカーのワールド座標を取得し、向き・長さを更新する。
    // =========================================================
    const hydraulics = [];
    function addHydraulic(parentA, localA, parentB, localB, opt = {}) {
      const aAnchor = new THREE.Object3D();
      aAnchor.position.copy(localA);
      parentA.add(aAnchor);
      const bAnchor = new THREE.Object3D();
      bAnchor.position.copy(localB);
      parentB.add(bAnchor);

      const barrelLen = opt.barrelLen ?? 1.8;
      const barrelR   = opt.barrelR   ?? 0.18;
      const rodR      = opt.rodR       ?? 0.10;

      // バレルもロッドも軸はローカルY。Y長さ1で作り scale.y で伸縮。
      const barrel = mesh(new THREE.CylinderGeometry(barrelR, barrelR, 1, 16), matBarrel);
      const rod    = mesh(new THREE.CylinderGeometry(rodR, rodR, 1, 12), matSteel);
      scene.add(barrel, rod);

      hydraulics.push({ aAnchor, bAnchor, barrel, rod, barrelLen });
    }

    const _wa = new THREE.Vector3(), _wb = new THREE.Vector3();
    const _dir = new THREE.Vector3(), _up = new THREE.Vector3(0, 1, 0);
    const _quat = new THREE.Quaternion(), _perp = new THREE.Vector3();
    function updateHydraulics() {
      for (const h of hydraulics) {
        h.aAnchor.getWorldPosition(_wa);
        h.bAnchor.getWorldPosition(_wb);
        _dir.subVectors(_wb, _wa);
        const D = Math.max(0.001, _dir.length());
        _dir.multiplyScalar(1 / D);
        _quat.setFromUnitVectors(_up, _dir);

        const bLen = Math.min(h.barrelLen, D * 0.6);
        // バレル: A端からB方向へ bLen
        h.barrel.scale.y = bLen;
        h.barrel.quaternion.copy(_quat);
        h.barrel.position.copy(_wa).addScaledVector(_dir, bLen / 2);
        // ロッド: B端からA方向へ。バレルと少し重ねる。
        const rodLen = Math.max(0.2, D - bLen + 0.3);
        h.rod.scale.y = rodLen;
        h.rod.quaternion.copy(_quat);
        h.rod.position.copy(_wb).addScaledVector(_dir, -rodLen / 2);
      }
    }

    // 1本のバー(単位長Yシリンダー)を a→b に向け、長さに合わせて伸縮
    const _bd = new THREE.Vector3();
    function orientBar(m, a, b) {
      _bd.subVectors(b, a);
      const L = Math.max(0.001, _bd.length());
      _bd.multiplyScalar(1 / L);
      m.quaternion.setFromUnitVectors(_up, _bd);
      m.scale.y = L;
      m.position.copy(a).addScaledVector(_bd, L / 2);
    }

    // =========================================================
    //  H型リンクの四節リンク解（YZ平面内の2円交点）
    // =========================================================
    let linkInit = false, L_idler = 0, L_power = 0;
    let prevNy = 0, prevNz = 0; // 前フレームの結節点(アームローカル)
    const _p1w = new THREE.Vector3(), _p2w = new THREE.Vector3();
    const _p1 = new THREE.Vector3(), _p2 = new THREE.Vector3(), _node = new THREE.Vector3();
    const _xoff = new THREE.Vector3(), _barA = new THREE.Vector3(), _barB = new THREE.Vector3();
    function updateLinkage() {
      idlerAnchor.getWorldPosition(_p1w);
      bucketLug.getWorldPosition(_p2w);
      // アームローカル系へ（回転軸=ローカルX、機構はYZ平面内）
      _p1.copy(_p1w); arm.worldToLocal(_p1);
      _p2.copy(_p2w); arm.worldToLocal(_p2);
      if (!linkInit) {
        // 初期姿勢から各リンク長を確定。結節点を先端側(+z)・やや上に置き、
        // アーム側(アイドラ)リンクを長くする（赤スケッチ/カタログ準拠）。
        prevNy = (_p1.y + _p2.y) / 2 + 0.45;
        prevNz = (_p1.z + _p2.z) / 2;
        L_idler = Math.hypot(prevNy - _p1.y, prevNz - _p1.z);
        L_power = Math.hypot(prevNy - _p2.y, prevNz - _p2.z);
        linkInit = true;
      }
      // 2円交点（中心 _p1,_p2、半径 L_idler,L_power）
      const dy = _p2.y - _p1.y, dz = _p2.z - _p1.z;
      const d = Math.hypot(dy, dz) || 1e-4;
      const a = (L_idler * L_idler - L_power * L_power + d * d) / (2 * d);
      let h2 = L_idler * L_idler - a * a; if (h2 < 0) h2 = 0;
      const hh = Math.sqrt(h2);
      const uy = dy / d, uz = dz / d;        // _p1→_p2 単位ベクトル
      const my = _p1.y + a * uy, mz = _p1.z + a * uz;
      // 2つの交点候補。前フレームの結節点に近い方を選ぶ(分岐連続性)。
      // これで開く途中にモードが反転してリンクが前に飛び出すのを防ぐ。
      const aY = my - hh * uz, aZ = mz + hh * uy;
      const bY = my + hh * uz, bZ = mz - hh * uy;
      const dA = (aY - prevNy) ** 2 + (aZ - prevNz) ** 2;
      const dB = (bY - prevNy) ** 2 + (bZ - prevNz) ** 2;
      const ny = dA <= dB ? aY : bY;
      const nz = dA <= dB ? aZ : bZ;
      prevNy = ny; prevNz = nz;
      _node.set(0, ny, nz);
      arm.localToWorld(_node);
      linkNode.position.copy(_node);
      // 左右にずらしてH型に見せる（軸方向と直交＝アームのローカルX）
      _xoff.set(1, 0, 0).transformDirection(arm.matrixWorld).multiplyScalar(LINK_HALF);
      for (let k = 0; k < 2; k++) {
        const s = k === 0 ? 1 : -1;
        _barA.copy(_node).addScaledVector(_xoff, s);          // 結節点（左右）
        _barB.copy(_p1w).addScaledVector(_xoff, s);           // アイドラ取付（左右）
        orientBar(idlerBars[k], _barB, _barA);
        _barB.copy(_p2w).addScaledVector(_xoff, s);           // バケットラグ（左右）
        orientBar(powerBars[k], _barB, _barA);
      }
    }

    // ブームシリンダー（左右2本）: 旋回体前部下のラグ → ブーム下面の左右ブラケット
    for (const sgn of [-1, 1]) {
      addHydraulic(
        swing, new THREE.Vector3(-0.45 + sgn * 0.36, 0.05, 1.7),
        boom,  new THREE.Vector3(sgn * 0.28, boomCenterY(2.5) - boomHalf(2.5) - 0.04, 2.5),
        { barrelLen: 1.9, barrelR: 0.14, rodR: 0.09 }
      );
    }
    // アームシリンダー: ブーム上面ブラケット → アーム基部ヒール後端ピン
    addHydraulic(
      boom, new THREE.Vector3(0, boomCenterY(boomBktZ) + boomHalf(boomBktZ) + 0.3, boomBktZ),
      arm,  new THREE.Vector3(0, 0.24, -0.55),
      { barrelLen: 1.4, barrelR: 0.13, rodR: 0.08 }
    );
    // バケットシリンダー: アーム上面（アームに接する低い位置）→ H型リンク結節点
    addHydraulic(
      arm,      new THREE.Vector3(0, 0.36, 0.95),
      linkNode, new THREE.Vector3(0, 0, 0),
      { barrelLen: 1.0, barrelR: 0.11, rodR: 0.07 }
    );

    // =========================================================
    //  関節の初期角度・クランプ（現実的な可動域）
    // =========================================================
    const joints = {
      swing:  { obj: swing,  axis: 'y', value: 0.0,    min: -Math.PI, max: Math.PI, speed: 0.9, wrap: true },
      // ブーム: 0=ほぼ水平前方。上げると負方向(先端が上)。
      boom:   { obj: boom,   axis: 'x', value: -0.35,  min: -1.15,  max: 0.35,  speed: 0.7 },
      // アーム: ブームに対する折れ角。伸ばし切り(min)を15°(≈0.26)狭めた。
      arm:    { obj: arm,    axis: 'x', value: 0.9,    min: 0.36,   max: 2.4,   speed: 0.9 },
      // バケット: 開閉。開き側を+45°拡大(min-2.28)、閉じ側を45°手前で制限(max0.22)。
      bucket: { obj: bucket, axis: 'x', value: 0.0,    min: -2.28,  max: 0.22,  speed: 1.2 },
    };

    function applyJoints() {
      for (const k in joints) {
        const j = joints[k];
        j.obj.rotation[j.axis] = j.value;
      }
    }
    applyJoints();

    // =========================================================
    //  バーチャルレバー（左右ジョイスティック）
    //  入力値 input.* は -1..1 で保持。
    //  left  : y(上下)=アーム, x(左右)=旋回
    //  right : y(上下)=ブーム, x(左右)=バケット
    // =========================================================
    const input = { lx: 0, ly: 0, rx: 0, ry: 0, tx: 0, ty: 0 };

    function setupStick(stickId, knobId, onChange, maxR = 44) {
      const stick = document.getElementById(stickId);
      const knob  = document.getElementById(knobId);
      let active = false;
      let pid = null;

      function center() {
        const r = stick.getBoundingClientRect();
        return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
      }
      function move(clientX, clientY) {
        const c = center();
        let dx = clientX - c.x;
        let dy = clientY - c.y;
        const dist = Math.hypot(dx, dy);
        if (dist > maxR) { dx *= maxR / dist; dy *= maxR / dist; }
        knob.style.transform = `translate(${dx}px, ${dy}px)`;
        knob.style.background = 'rgba(255,235,150,0.95)';
        // 正規化: 右+ / 下+ → 必要に応じて呼び出し側で反転
        onChange(dx / maxR, dy / maxR);
      }
      function release() {
        active = false; pid = null;
        knob.style.transform = 'translate(0,0)';
        knob.style.background = 'rgba(255,255,255,0.85)';
        onChange(0, 0);
      }

      // Pointer Events（タッチ・マウス両対応）
      stick.addEventListener('pointerdown', (e) => {
        active = true; pid = e.pointerId;
        stick.setPointerCapture(pid);
        move(e.clientX, e.clientY);
        e.preventDefault();
      });
      stick.addEventListener('pointermove', (e) => {
        if (!active || e.pointerId !== pid) return;
        move(e.clientX, e.clientY);
        e.preventDefault();
      });
      const end = (e) => {
        if (e.pointerId !== pid) return;
        release();
        e.preventDefault();
      };
      stick.addEventListener('pointerup', end);
      stick.addEventListener('pointercancel', end);
      stick.addEventListener('lostpointercapture', () => { if (active) release(); });
    }

    setupStick('stickLeft', 'knobLeft', (x, y) => {
      input.lx = x;   // 旋回
      input.ly = y;   // アーム
    });
    setupStick('stickRight', 'knobRight', (x, y) => {
      input.rx = x;   // バケット
      input.ry = y;   // ブーム
    });
    setupStick('stickTravel', 'knobTravel', (x, y) => {
      input.tx = x;   // 走行 旋回
      input.ty = y;   // 走行 前後
    }, 30);

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

    // ===== 重機本体の走行（前後進・信地旋回）=====
    const TRAVEL_SPEED = 1.6; // 前後速度(m/s)
    const TURN_SPEED   = 0.5; // 旋回速度(rad/s)
    function updateTravel(dt) {
      // 旋回: 左に倒す(tx<0)→左旋回(+Y)
      base.rotation.y -= input.tx * TURN_SPEED * dt;
      // 前後: 上に倒す(ty<0)→前進。機体前方は base ローカル +Z。
      const fwd = -input.ty * TRAVEL_SPEED * dt;
      const h = base.rotation.y;
      base.position.x += Math.sin(h) * fwd;
      base.position.z += Math.cos(h) * fwd;
      // 掘削エリア内に収める
      const lim = FIELD_HW - 6;
      base.position.x = clamp(base.position.x, -lim, lim);
      base.position.z = clamp(base.position.z, -lim, lim);
    }

    // 地面との貫入制限: バケットの最下部が地表より深く潜れるのは MAX_PEN まで。
    // それ以上潜らせようとしてもブーム/アームを戻して止める（掘れた分だけ下がる）。
    // 刃先だけでなく底の複数点を見る（掬って閉じると底が最下点になるため）。
    const MAX_PEN = 0.55;
    const _samplePts = [
      new THREE.Vector3(0,    -0.86, -0.92), // 刃先
      new THREE.Vector3(0,    -0.90, -0.32), // 底 中央
      new THREE.Vector3(0,    -0.86,  0.10), // 底 かかと側
      new THREE.Vector3( 0.4, -0.88, -0.32), // 底 右
      new THREE.Vector3(-0.4, -0.88, -0.32), // 底 左
    ];
    const _ctip = new THREE.Vector3();
    let lastPen = 0;
    function tipPenetration() {
      bucket.updateWorldMatrix(true, false);
      let mp = -Infinity;
      for (const p of _samplePts) {
        _ctip.copy(p);
        bucket.localToWorld(_ctip);
        const pen = heightAtWorld(_ctip.x, _ctip.z) - _ctip.y;
        if (pen > mp) mp = pen;
      }
      return mp;
    }

    function updateJoints(dt) {
      const prevBoom = joints.boom.value, prevArm = joints.arm.value;

      // 旋回（左レバー左右）: 左に倒す(x<0)→反時計回り(+Y)
      joints.swing.value -= input.lx * joints.swing.speed * dt;
      // 角度ラップ
      if (joints.swing.value > Math.PI)  joints.swing.value -= Math.PI * 2;
      if (joints.swing.value < -Math.PI) joints.swing.value += Math.PI * 2;

      // アーム（左レバー上下）: 上に倒す(y<0)→伸ばす(角度を小さく)
      joints.arm.value = clamp(joints.arm.value + input.ly * joints.arm.speed * dt, joints.arm.min, joints.arm.max);

      // ブーム（右レバー上下）: 上に倒す(y<0)→ブーム下げ / 下に倒す(y>0)→ブーム上げ
      joints.boom.value = clamp(joints.boom.value - input.ry * joints.boom.speed * dt, joints.boom.min, joints.boom.max);

      // バケット（右レバー左右）: 右(x>0)→開く(角度小さく), 左→閉じる(掬う)
      joints.bucket.value = clamp(joints.bucket.value - input.rx * joints.bucket.speed * dt, joints.bucket.min, joints.bucket.max);

      applyJoints();

      // 先端が許容より深く、かつ今フレームでさらに深くなったら、ブーム/アームを
      // 戻して下降を止める（横移動や上げ・掬いはそのまま許可）。
      let pen = tipPenetration();
      if (pen > MAX_PEN && pen > lastPen + 1e-4) {
        joints.boom.value = prevBoom;
        joints.arm.value = prevArm;
        applyJoints();
        pen = tipPenetration();
      }
      lastPen = pen;
    }

    // =========================================================
    //  掘削・排土（地形変形＋バケット積載）
    // =========================================================
    const LOAD_CAP   = 1.0;     // バケット容量（正規化）
    const DIG_RADIUS = 0.7;     // 掘削ブラシ半径(バケット幅相当)
    let   bucketLoad = 0;       // 現在の積載量 0..1
    const _tip = new THREE.Vector3();
    let   fieldChanged = false; // この変形で頂点が動いたか
    let   normAccum = 0;        // 法線再計算の間引き用

    // 刃先まわりの頂点を tipY まで下げ、削った分を積載量へ
    function digBrush(cx, cz, tipY, dt) {
      const target = Math.max(tipY, DIG_MIN);
      const rad = Math.ceil(DIG_RADIUS / CELL);
      const ixc = Math.round((cx + FIELD_HW) / CELL);
      const izc = Math.round((FIELD_HW + cz) / CELL);
      const rate = 3.2 * dt; // 1フレームの最大降下量
      let changed = false;
      for (let dz = -rad; dz <= rad; dz++) {
        for (let dx = -rad; dx <= rad; dx++) {
          if (bucketLoad >= LOAD_CAP) return changed;
          const ix = ixc + dx, iy = izc + dz;
          if (ix < 0 || ix > FIELD_SEG || iy < 0 || iy > FIELD_SEG) continue;
          const wx = ix * CELL - FIELD_HW;
          const wz = iy * CELL - FIELD_HW;
          const d = Math.hypot(wx - cx, wz - cz);
          if (d > DIG_RADIUS) continue;
          const idx = iy * (FIELD_SEG + 1) + ix;
          const h = fieldPos.getY(idx);
          if (h <= target + 0.001) continue;
          const fall = 1 - d / DIG_RADIUS;
          const lower = Math.min(h - target, rate * (0.4 + 0.6 * fall));
          if (lower <= 0) continue;
          const nh = h - lower;
          fieldPos.setY(idx, nh);
          setVertColor(idx, nh);
          bucketLoad = Math.min(LOAD_CAP, bucketLoad + lower * 0.16);
          changed = true;
        }
      }
      return changed;
    }

    // 刃先直下に盛土（排土）
    function pileBrush(cx, cz, amount) {
      const R = DIG_RADIUS + 0.5;
      const rad = Math.ceil(R / CELL);
      const ixc = Math.round((cx + FIELD_HW) / CELL);
      const izc = Math.round((FIELD_HW + cz) / CELL);
      const rise = amount * 2.2;
      let changed = false;
      for (let dz = -rad; dz <= rad; dz++) {
        for (let dx = -rad; dx <= rad; dx++) {
          const ix = ixc + dx, iy = izc + dz;
          if (ix < 0 || ix > FIELD_SEG || iy < 0 || iy > FIELD_SEG) continue;
          const wx = ix * CELL - FIELD_HW;
          const wz = iy * CELL - FIELD_HW;
          const d = Math.hypot(wx - cx, wz - cz);
          if (d > R) continue;
          const idx = iy * (FIELD_SEG + 1) + ix;
          const h = fieldPos.getY(idx);
          const fall = 1 - d / R;
          const nh = Math.min(PILE_MAX, h + rise * fall * fall);
          if (nh - h < 0.0005) continue;
          fieldPos.setY(idx, nh);
          setVertColor(idx, nh);
          changed = true;
        }
      }
      return changed;
    }

    function updateSoilVisual() {
      if (bucketLoad > 0.02) {
        soilInBucket.visible = true;
        const s = 0.35 + 0.65 * bucketLoad;
        soilInBucket.scale.set(0.7 + 0.3 * bucketLoad, s, 0.7 + 0.3 * bucketLoad);
      } else {
        soilInBucket.visible = false;
      }
      const fill = document.getElementById('loadFill');
      if (fill) fill.style.width = (bucketLoad * 100).toFixed(0) + '%';
    }

    function updateDigging(dt) {
      bucketTip.getWorldPosition(_tip);
      const groundH = heightAtWorld(_tip.x, _tip.z);
      const penetrating = _tip.y < groundH - 0.02;
      // バケット: value大=閉じる(掬う) / 小=開く(排土)。
      // 可動域[-2.35..0.35]なので、十分に開いた時だけ排土と判定する。
      const isOpen = joints.bucket.value < -1.3;

      let changed = false;
      if (penetrating && bucketLoad < LOAD_CAP && !isOpen) {
        changed = digBrush(_tip.x, _tip.z, _tip.y, dt);
      } else if (isOpen && bucketLoad > 0 && _tip.y > groundH + 0.05) {
        const drop = Math.min(bucketLoad, dt * 0.7);
        bucketLoad -= drop;
        changed = pileBrush(_tip.x, _tip.z, drop);
      }

      updateSoilVisual();

      if (changed) {
        fieldPos.needsUpdate = true;
        colAttr.needsUpdate = true;
        fieldChanged = true;
      }
      // 法線の再計算は重いので ~20Hz に間引く
      normAccum += dt;
      if (fieldChanged && normAccum > 0.05) {
        fieldGeo.computeVertexNormals();
        normAccum = 0;
        fieldChanged = false;
      }
    }

    // ===== リサイズ対応 =====
    function resize() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      renderer.setSize(w, h, false);
      renderer.domElement.style.width = w + 'px';
      renderer.domElement.style.height = h + 'px';
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }
    window.addEventListener('resize', resize);
    window.addEventListener('orientationchange', () => setTimeout(resize, 200));
    resize();

    // ===== メインループ =====
    const clock = new THREE.Clock();
    function animate() {
      const dt = Math.min(clock.getDelta(), 0.05);
      updateTravel(dt);
      updateJoints(dt);
      updateLinkage();
      updateHydraulics();
      updateDigging(dt);
      // カメラは機体を追従（一定のオフセットで見下ろす）
      camera.position.set(base.position.x + 9, 7, base.position.z + 12);
      camera.lookAt(base.position.x, 1.4, base.position.z);
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
