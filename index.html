<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>油圧ショベル操作シミュレーター</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #87b9e0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      -webkit-user-select: none; user-select: none;
      -webkit-touch-callout: none;
    }
    #app { position: fixed; inset: 0; }
    canvas { display: block; width: 100%; height: 100%; }

    /* バーチャルレバーのオーバーレイ */
    #controls {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      /* セーフエリア対応 */
      padding: 0 max(24px, env(safe-area-inset-left)) max(24px, env(safe-area-inset-bottom)) max(24px, env(safe-area-inset-right));
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      pointer-events: none; /* 個々のスティックだけ受ける */
      z-index: 10;
    }
    .stick {
      position: relative;
      width: 130px; height: 130px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.45);
      touch-action: none;
      pointer-events: auto;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }
    .knob {
      position: absolute;
      left: 50%; top: 50%;
      width: 58px; height: 58px;
      margin-left: -29px; margin-top: -29px;
      border-radius: 50%;
      background: rgba(255,255,255,0.85);
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
      transition: background 0.1s;
    }
    .stick .label {
      position: absolute;
      left: 0; right: 0; top: -26px;
      text-align: center;
      color: #fff;
      font-size: 12px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.6);
      letter-spacing: 1px;
    }
    .stick .axis-hint {
      position: absolute;
      color: rgba(255,255,255,0.7);
      font-size: 10px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.6);
      pointer-events: none;
    }
    .axis-hint.top    { left:0; right:0; top:6px;    text-align:center; }
    .axis-hint.bottom { left:0; right:0; bottom:6px; text-align:center; }
    .axis-hint.left   { left:6px; top:50%; transform:translateY(-50%); }
    .axis-hint.right  { right:6px; top:50%; transform:translateY(-50%); }

    #title {
      position: fixed; top: 0; left: 0; right: 0;
      padding: max(10px, env(safe-area-inset-top)) 14px 4px;
      color: #fff; font-size: 13px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
      pointer-events: none; z-index: 10;
    }
    #hud {
      position: fixed;
      top: calc(max(10px, env(safe-area-inset-top)) + 24px);
      left: 14px;
      pointer-events: none; z-index: 10;
    }
    #loadLabel {
      color: #fff; font-size: 11px; margin-bottom: 3px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    }
    #loadBar {
      width: 140px; height: 12px;
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 6px; overflow: hidden;
      background: rgba(0,0,0,0.25);
    }
    #loadFill {
      width: 0%; height: 100%;
      background: linear-gradient(90deg, #c39a5e, #8a6233);
      transition: width 0.08s linear;
    }
  </style>

  <!-- Three.js を importmap で読み込む（ビルド不要） -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
  </script>
</head>
<body>
  <div id="app"></div>

  <div id="title">油圧ショベル操作シミュレーター（JISパターン）</div>

  <div id="hud">
    <div id="loadLabel">バケット土量</div>
    <div id="loadBar"><div id="loadFill"></div></div>
  </div>

  <div id="controls">
    <div class="stick" id="stickLeft">
      <div class="label">左レバー</div>
      <div class="axis-hint top">アーム伸</div>
      <div class="axis-hint bottom">アーム縮</div>
      <div class="axis-hint left">旋回左</div>
      <div class="axis-hint right">旋回右</div>
      <div class="knob" id="knobLeft"></div>
    </div>
    <div class="stick" id="stickRight">
      <div class="label">右レバー</div>
      <div class="axis-hint top">ブーム下</div>
      <div class="axis-hint bottom">ブーム上</div>
      <div class="axis-hint left">バケット閉</div>
      <div class="axis-hint right">バケット開</div>
      <div class="knob" id="knobRight"></div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';

    // ===== 色定義 =====
    const COLOR_BODY   = 0x0B5FA5; // コベルコ建機ブルー系
    const COLOR_DARK   = 0x2b2f33; // 履帯・バケット ダークグレー
    const COLOR_DARK2  = 0x3c4146; // やや明るいダークグレー
    const COLOR_GROUND = 0x9caa6f; // 地面

    // ===== レンダラ =====
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.05;
    document.getElementById('app').appendChild(renderer.domElement);

    // ===== シーン =====
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87b9e0);
    scene.fog = new THREE.Fog(0x87b9e0, 40, 115);

    // ===== カメラ（斜め見下ろし）=====
    const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 500);
    camera.position.set(22, 18, 26);
    camera.lookAt(0, 3, 0);

    // ===== ライト =====
    // 空(青)＋地面(土色)からの環境光で陰影に色味を持たせる
    const hemi = new THREE.HemisphereLight(0xbcd6f0, 0x5a5238, 0.85);
    scene.add(hemi);

    const ambient = new THREE.AmbientLight(0xffffff, 0.25);
    scene.add(ambient);

    const dir = new THREE.DirectionalLight(0xfff4e0, 1.15);
    dir.position.set(20, 35, 15);
    dir.castShadow = true;
    dir.shadow.mapSize.set(2048, 2048);
    dir.shadow.camera.near = 1;
    dir.shadow.camera.far = 120;
    dir.shadow.camera.left = -40;
    dir.shadow.camera.right = 40;
    dir.shadow.camera.top = 40;
    dir.shadow.camera.bottom = -40;
    dir.shadow.bias = -0.0004;
    dir.shadow.normalBias = 0.02;
    scene.add(dir);

    // 逆光側からの弱い補助光（影が真っ黒にならないように）
    const fill = new THREE.DirectionalLight(0xaac4e0, 0.3);
    fill.position.set(-18, 12, -20);
    scene.add(fill);

    // ===== 地面（土っぽい手続き的テクスチャ）=====
    function makeGroundTexture() {
      const S = 512;
      const cv = document.createElement('canvas');
      cv.width = cv.height = S;
      const ctx = cv.getContext('2d');
      // ベースの土色
      ctx.fillStyle = '#8f9a63';
      ctx.fillRect(0, 0, S, S);
      // ランダムな斑点で凹凸感
      for (let i = 0; i < 9000; i++) {
        const x = Math.random() * S, y = Math.random() * S;
        const r = Math.random() * 2.4 + 0.4;
        const shade = (Math.random() * 60 - 30) | 0;
        const base = 0x8f, g = 0x9a, b = 0x63;
        ctx.fillStyle = `rgb(${base + shade}, ${g + shade}, ${b + (shade >> 1)})`;
        ctx.globalAlpha = 0.5;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      const tex = new THREE.CanvasTexture(cv);
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      tex.repeat.set(40, 40);
      tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }
    const groundTex = makeGroundTexture();
    // 遠景の地面（掘削エリアの外周〜地平線を埋める。掘れる面より深く沈めて
    // 掘った穴の底からは見えないようにする）。
    const farGround = new THREE.Mesh(
      new THREE.BoxGeometry(600, 1, 600),
      new THREE.MeshStandardMaterial({ map: groundTex, roughness: 1.0 })
    );
    farGround.position.y = -8.5; // 上面が y=-8
    farGround.receiveShadow = true;
    scene.add(farGround);

    // ===== 掘削できる地形（ハイトフィールド）=====
    // PlaneGeometry を XZ 平面に倒し、頂点の「高さ」を動的に変形させる。
    // 倒した後はローカルZが world+Y（高さ）方向、ローカル(x,y)→world(x,-z)。
    const FIELD_SIZE = 64;   // 一辺の長さ
    const FIELD_SEG  = 64;   // 分割数（頂点間隔=1.0）
    const FIELD_HW   = FIELD_SIZE / 2;
    const CELL       = FIELD_SIZE / FIELD_SEG;
    const DIG_MIN    = -3.2; // 掘れる深さ下限
    const PILE_MAX   = 3.0;  // 盛れる高さ上限

    const fieldGeo = new THREE.PlaneGeometry(FIELD_SIZE, FIELD_SIZE, FIELD_SEG, FIELD_SEG);
    fieldGeo.rotateX(-Math.PI / 2); // XZ平面へ。以後 position.y が高さになる。
    const vertCount = (FIELD_SEG + 1) * (FIELD_SEG + 1);
    // 頂点カラー（草=緑／掘削面・盛土=土色）
    const colAttr = new THREE.Float32BufferAttribute(new Float32Array(vertCount * 3), 3);
    fieldGeo.setAttribute('color', colAttr);

    // sRGB色をリニアに変換して保持（vertexColorsはリニア前提）
    const C_GRASS = new THREE.Color(0x8f9a63).convertSRGBToLinear();
    const C_DIRT  = new THREE.Color(0x6f5337).convertSRGBToLinear(); // 掘削面
    const C_DEEP  = new THREE.Color(0x4d3a26).convertSRGBToLinear(); // 深部
    const C_PILE  = new THREE.Color(0x866444).convertSRGBToLinear(); // 盛土（ほぐれた土）

    function setVertColor(idx, h) {
      let c;
      if (h > 0.04) {
        c = C_PILE;
      } else if (h < -0.04) {
        const t = Math.min(1, -h / 3);
        c = C_DIRT.clone().lerp(C_DEEP, t);
      } else {
        c = C_GRASS;
      }
      colAttr.setXYZ(idx, c.r, c.g, c.b);
    }
    for (let i = 0; i < vertCount; i++) setVertColor(i, 0);
    colAttr.needsUpdate = true;

    const field = new THREE.Mesh(
      fieldGeo,
      new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 1.0, metalness: 0.0 })
    );
    field.receiveShadow = true;
    field.castShadow = true;
    scene.add(field);

    const fieldPos = fieldGeo.attributes.position;
    // 高さの読み書き（world座標→頂点）。倒した後 position.y がそのまま高さ。
    function fieldIndex(wx, wz) {
      // PlaneGeometry頂点配列順: iy(行,上→下) × ix(列,左→右)
      // ローカル: x=wx, y=-wz。 x: -HW..HW, 元のy(=-wz): HW..-HW
      const ix = Math.round((wx + FIELD_HW) / CELL);
      const iy = Math.round((FIELD_HW - (-wz)) / CELL); // = (FIELD_HW + wz)/CELL
      if (ix < 0 || ix > FIELD_SEG || iy < 0 || iy > FIELD_SEG) return -1;
      return iy * (FIELD_SEG + 1) + ix;
    }
    function heightAtWorld(wx, wz) {
      const i = fieldIndex(wx, wz);
      return i < 0 ? 0 : fieldPos.getY(i);
    }

    // ===== マテリアル =====
    const matBody  = new THREE.MeshStandardMaterial({ color: COLOR_BODY,  roughness: 0.55, metalness: 0.25 });
    const matDark  = new THREE.MeshStandardMaterial({ color: COLOR_DARK,  roughness: 0.9,  metalness: 0.1 });
    const matDark2 = new THREE.MeshStandardMaterial({ color: COLOR_DARK2, roughness: 0.85, metalness: 0.1 });
    // 油圧シリンダーのロッド（クロムメッキ風の光る鋼）
    const matSteel = new THREE.MeshStandardMaterial({ color: 0xc9ccd2, roughness: 0.2, metalness: 0.9 });
    // シリンダーのバレル（やや暗い鋼）
    const matBarrel = new THREE.MeshStandardMaterial({ color: 0x4a4f55, roughness: 0.45, metalness: 0.7 });

    // 影を落とす／受ける設定のヘルパ
    function mesh(geo, mat) {
      const m = new THREE.Mesh(geo, mat);
      m.castShadow = true;
      m.receiveShadow = true;
      return m;
    }

    // =========================================================
    //  関節の親子構造
    //  base
    //   └ swing (Y軸旋回)
    //       └ boom (X軸ピッチ)
    //           └ arm (X軸ピッチ)
    //               └ bucket (X軸ピッチ)
    //  各 Group の原点 = 関節の付け根（ピボット）。
    //  ジオメトリは原点からオフセットして配置する。
    // =========================================================

    // ----- ベース（車体下部＋履帯, 固定）-----
    const base = new THREE.Group();
    scene.add(base);

    // 履帯（左右2本）ダークグレー
    const trackGeo = new THREE.BoxGeometry(2.0, 1.6, 9.0);
    const trackL = mesh(trackGeo, matDark);
    trackL.position.set(-2.6, 0.8, 0);
    base.add(trackL);
    const trackR = mesh(trackGeo, matDark);
    trackR.position.set(2.6, 0.8, 0);
    base.add(trackR);

    // 駆動輪(後)・遊動輪(前) — 大きめのスプロケット
    for (const sx of [-2.6, 2.6]) {
      for (const sz of [-3.6, 3.6]) {
        const wheel = mesh(
          new THREE.CylinderGeometry(0.95, 0.95, 2.1, 24),
          matDark2
        );
        wheel.rotation.z = Math.PI / 2;
        wheel.position.set(sx, 0.8, sz);
        base.add(wheel);
        // ハブ（中心の明るい円盤）
        const hub = mesh(new THREE.CylinderGeometry(0.4, 0.4, 2.18, 16), matDark);
        hub.rotation.z = Math.PI / 2;
        hub.position.set(sx, 0.8, sz);
        base.add(hub);
      }
    }
    // 下部転輪（小径ローラーを下側に複数）
    for (const sx of [-2.6, 2.6]) {
      for (const sz of [-2.0, -0.7, 0.7, 2.0]) {
        const r = mesh(new THREE.CylinderGeometry(0.5, 0.5, 2.05, 16), matDark);
        r.rotation.z = Math.PI / 2;
        r.position.set(sx, 0.5, sz);
        base.add(r);
      }
    }

    // 履板（グローサ）— 履帯の外周に沿って等間隔のプレートを並べる
    // 楕円状の経路（前後の輪 + 上下の直線）を近似して配置。
    function addTrackShoes(sx) {
      const shoeGeo = new THREE.BoxGeometry(2.15, 0.18, 0.62);
      const R = 0.95;           // 端の輪の半径
      const zEnd = 3.6;         // 端の輪の中心z
      const yC = 0.8;           // 輪の中心高さ
      const N = 9;              // 上下の直線部の枚数
      const place = (y, z, rot) => {
        const shoe = mesh(shoeGeo, matDark);
        shoe.position.set(sx, y, z);
        shoe.rotation.x = rot;
        base.add(shoe);
        // グローサの突起（接地ラグ）
        const lug = mesh(new THREE.BoxGeometry(2.0, 0.12, 0.16), matDark2);
        lug.position.set(sx, y - Math.cos(rot) * 0.14, z + Math.sin(rot) * 0.14);
        lug.rotation.x = rot;
        base.add(lug);
      };
      // 上面（直線）
      for (let i = 0; i < N; i++) {
        const z = -zEnd + (2 * zEnd) * (i / (N - 1));
        place(yC + R, z, 0);
      }
      // 下面（直線, 接地側）
      for (let i = 0; i < N; i++) {
        const z = -zEnd + (2 * zEnd) * (i / (N - 1));
        place(yC - R, z, Math.PI);
      }
      // 前後の輪の周り（半円）
      const arc = 6;
      for (const [zc, dir] of [[zEnd, 1], [-zEnd, -1]]) {
        for (let i = 1; i < arc; i++) {
          const a = -Math.PI / 2 + Math.PI * (i / arc); // -90°→+90°
          const y = yC + R * Math.cos(a);
          const z = zc + dir * R * Math.sin(a);
          place(y, z, dir * a + (dir < 0 ? Math.PI : 0));
        }
      }
    }
    addTrackShoes(-2.6);
    addTrackShoes(2.6);

    // 下部フレーム
    const underframe = mesh(new THREE.BoxGeometry(4.0, 0.8, 6.5), matDark2);
    underframe.position.set(0, 1.7, 0);
    base.add(underframe);

    // ----- 上部旋回体（Y軸で旋回）-----
    const swing = new THREE.Group();
    swing.position.set(0, 2.1, 0); // 旋回ピボット = 下部フレーム上面の中心
    base.add(swing);

    // 旋回テーブル（円柱）
    const turntable = mesh(new THREE.CylinderGeometry(2.6, 2.6, 0.5, 28), matDark2);
    turntable.position.set(0, 0.25, 0);
    swing.add(turntable);

    // 車体本体（ブルー）少し後方寄り
    const cabBody = mesh(new THREE.BoxGeometry(4.2, 2.2, 5.2), matBody);
    cabBody.position.set(0, 1.6, -0.8);
    swing.add(cabBody);

    // カウンターウェイト（後部, ダーク）
    const counter = mesh(new THREE.BoxGeometry(4.4, 2.0, 1.4), matDark2);
    counter.position.set(0, 1.6, -3.4);
    swing.add(counter);

    // オペレータキャブ（左前, ブルー＋ガラス風）
    const cab = mesh(new THREE.BoxGeometry(2.0, 2.4, 2.4), matBody);
    cab.position.set(-1.4, 2.0, 1.6);
    swing.add(cab);
    const cabGlass = mesh(
      new THREE.BoxGeometry(1.9, 1.6, 2.3),
      new THREE.MeshStandardMaterial({ color: 0x223344, roughness: 0.2, metalness: 0.4, transparent: true, opacity: 0.7 })
    );
    cabGlass.position.set(-1.45, 2.4, 1.6);
    swing.add(cabGlass);

    // 排気筒
    const stack = mesh(new THREE.CylinderGeometry(0.18, 0.18, 0.9, 12), matDark);
    stack.position.set(1.4, 3.1, -1.0);
    swing.add(stack);

    // ブームの取り付け基部（前方右寄り）— ここがブームのピボット
    const BOOM_PIVOT = new THREE.Vector3(0.9, 1.4, 2.4);

    // ----- ブーム（X軸ピッチ）-----
    const boom = new THREE.Group();
    boom.position.copy(BOOM_PIVOT);
    swing.add(boom);

    // ブーム本体: 長さ約6.5。付け根が原点なので前方(+方向)へオフセット。
    // ブームは「く」の字気味に上に伸びる形を1本のボックスで近似。
    const BOOM_LEN = 6.6;
    const boomBox = mesh(new THREE.BoxGeometry(0.9, 0.9, BOOM_LEN), matBody);
    // ローカル: ピボットから前方へ伸ばす（中心を半分だけ前に）
    boomBox.position.set(0, 0, BOOM_LEN / 2);
    boom.add(boomBox);

    // ブームのピボット軸（シリンダー, 横向き）
    const boomPin = mesh(new THREE.CylinderGeometry(0.55, 0.55, 1.2, 16), matDark);
    boomPin.rotation.z = Math.PI / 2;
    boom.add(boomPin);


    // ----- アーム（X軸ピッチ）-----
    // ブーム先端がアームのピボット。
    const arm = new THREE.Group();
    arm.position.set(0, 0, BOOM_LEN); // ブーム先端
    boom.add(arm);

    const ARM_LEN = 4.8;
    const armBox = mesh(new THREE.BoxGeometry(0.7, 0.7, ARM_LEN), matBody);
    armBox.position.set(0, 0, ARM_LEN / 2);
    arm.add(armBox);

    const armPin = mesh(new THREE.CylinderGeometry(0.42, 0.42, 0.9, 16), matDark);
    armPin.rotation.z = Math.PI / 2;
    arm.add(armPin);


    // ----- バケット（X軸ピッチで開閉）-----
    // アーム先端がバケットのピボット。
    const bucket = new THREE.Group();
    bucket.position.set(0, 0, ARM_LEN); // アーム先端
    arm.add(bucket);

    const bucketPin = mesh(new THREE.CylinderGeometry(0.32, 0.32, 0.8, 16), matDark);
    bucketPin.rotation.z = Math.PI / 2;
    bucket.add(bucketPin);

    // バケット形状: 背板＋底板＋側板2枚（ダークグレー）
    // 付け根(原点)から先端へオフセットして配置。
    const bucketMat = matDark;
    const back = mesh(new THREE.BoxGeometry(1.6, 1.3, 0.18), bucketMat);
    back.position.set(0, -0.4, 0.25);
    bucket.add(back);

    const bottom = mesh(new THREE.BoxGeometry(1.6, 0.18, 1.3), bucketMat);
    bottom.position.set(0, -1.0, 0.85);
    bottom.rotation.x = -0.15;
    bucket.add(bottom);

    for (const sx of [-0.8, 0.8]) {
      const side = mesh(new THREE.BoxGeometry(0.16, 1.2, 1.3), bucketMat);
      side.position.set(sx, -0.6, 0.7);
      bucket.add(side);
    }
    // 刃先（ツース風）
    for (let i = -1; i <= 1; i++) {
      const tooth = mesh(new THREE.BoxGeometry(0.22, 0.18, 0.45), matDark2);
      tooth.position.set(i * 0.5, -0.95, 1.55);
      tooth.rotation.x = -0.15;
      bucket.add(tooth);
    }

    // 掘削判定用の刃先アンカー（ツースの先端あたり）
    const bucketTip = new THREE.Object3D();
    bucketTip.position.set(0, -1.0, 1.75);
    bucket.add(bucketTip);

    // バケット内の土（積載量に応じて表示・スケール）
    const matSoil = new THREE.MeshStandardMaterial({ color: 0x6f5337, roughness: 1.0 });
    const soilInBucket = mesh(new THREE.BoxGeometry(1.4, 0.9, 1.15), matSoil);
    soilInBucket.position.set(0, -0.55, 0.8);
    soilInBucket.visible = false;
    bucket.add(soilInBucket);

    // =========================================================
    //  油圧シリンダー（関節連動でロッドが伸縮）
    //  2点(アンカー)の間を、固定長のバレル＋スライドするロッドで繋ぐ。
    //  各フレームでアンカーのワールド座標を取得し、向き・長さを更新する。
    // =========================================================
    const hydraulics = [];
    function addHydraulic(parentA, localA, parentB, localB, opt = {}) {
      const aAnchor = new THREE.Object3D();
      aAnchor.position.copy(localA);
      parentA.add(aAnchor);
      const bAnchor = new THREE.Object3D();
      bAnchor.position.copy(localB);
      parentB.add(bAnchor);

      const barrelLen = opt.barrelLen ?? 1.8;
      const barrelR   = opt.barrelR   ?? 0.18;
      const rodR      = opt.rodR       ?? 0.10;

      // バレルもロッドも軸はローカルY。Y長さ1で作り scale.y で伸縮。
      const barrel = mesh(new THREE.CylinderGeometry(barrelR, barrelR, 1, 16), matBarrel);
      const rod    = mesh(new THREE.CylinderGeometry(rodR, rodR, 1, 12), matSteel);
      // 取り付けピン（両端）
      const pinA = mesh(new THREE.CylinderGeometry(barrelR * 1.3, barrelR * 1.3, barrelR * 3, 12), matDark);
      const pinB = mesh(new THREE.CylinderGeometry(rodR * 1.6, rodR * 1.6, barrelR * 3, 12), matDark);
      scene.add(barrel, rod, pinA, pinB);

      hydraulics.push({ aAnchor, bAnchor, barrel, rod, pinA, pinB, barrelLen });
    }

    const _wa = new THREE.Vector3(), _wb = new THREE.Vector3();
    const _dir = new THREE.Vector3(), _up = new THREE.Vector3(0, 1, 0);
    const _quat = new THREE.Quaternion(), _perp = new THREE.Vector3();
    function updateHydraulics() {
      for (const h of hydraulics) {
        h.aAnchor.getWorldPosition(_wa);
        h.bAnchor.getWorldPosition(_wb);
        _dir.subVectors(_wb, _wa);
        const D = Math.max(0.001, _dir.length());
        _dir.multiplyScalar(1 / D);
        _quat.setFromUnitVectors(_up, _dir);

        const bLen = Math.min(h.barrelLen, D * 0.6);
        // バレル: A端からB方向へ bLen
        h.barrel.scale.y = bLen;
        h.barrel.quaternion.copy(_quat);
        h.barrel.position.copy(_wa).addScaledVector(_dir, bLen / 2);
        // ロッド: B端からA方向へ。バレルと少し重ねる。
        const rodLen = Math.max(0.2, D - bLen + 0.3);
        h.rod.scale.y = rodLen;
        h.rod.quaternion.copy(_quat);
        h.rod.position.copy(_wb).addScaledVector(_dir, -rodLen / 2);
        // ピン（軸方向と直交させて横向きに）
        _perp.set(0, 0, 1).applyQuaternion(_quat); // 適当な直交軸
        h.pinA.quaternion.setFromUnitVectors(_up, _perp);
        h.pinA.position.copy(_wa);
        h.pinB.quaternion.copy(h.pinA.quaternion);
        h.pinB.position.copy(_wb);
      }
    }

    // ブームシリンダー: 旋回体前部下 → ブーム下面
    addHydraulic(
      swing, new THREE.Vector3(0.9, 0.0, 1.4),
      boom,  new THREE.Vector3(0, -0.55, 3.2),
      { barrelLen: 2.6, barrelR: 0.22, rodR: 0.13 }
    );
    // アームシリンダー: ブーム上面 → アーム上面付け根
    addHydraulic(
      boom, new THREE.Vector3(0, 0.75, 3.0),
      arm,  new THREE.Vector3(0, 0.55, 1.1),
      { barrelLen: 2.2, barrelR: 0.19, rodR: 0.11 }
    );
    // バケットシリンダー: アーム上面先端 → バケット背面上部
    addHydraulic(
      arm,    new THREE.Vector3(0, 0.6, 3.4),
      bucket, new THREE.Vector3(0, 0.35, 0.15),
      { barrelLen: 1.5, barrelR: 0.15, rodR: 0.09 }
    );

    // =========================================================
    //  関節の初期角度・クランプ（現実的な可動域）
    // =========================================================
    const joints = {
      swing:  { obj: swing,  axis: 'y', value: 0.0,    min: -Math.PI, max: Math.PI, speed: 0.9, wrap: true },
      // ブーム: 0=ほぼ水平前方。上げると負方向(先端が上)。
      boom:   { obj: boom,   axis: 'x', value: -0.35,  min: -1.15,  max: 0.35,  speed: 0.7 },
      // アーム: ブームに対する折れ角。
      arm:    { obj: arm,    axis: 'x', value: 0.9,    min: 0.1,    max: 2.4,   speed: 0.9 },
      // バケット: 開閉（掘削/排土）。
      bucket: { obj: bucket, axis: 'x', value: 0.4,    min: -0.4,   max: 2.6,   speed: 1.1 },
    };

    function applyJoints() {
      for (const k in joints) {
        const j = joints[k];
        j.obj.rotation[j.axis] = j.value;
      }
    }
    applyJoints();

    // =========================================================
    //  バーチャルレバー（左右ジョイスティック）
    //  入力値 input.* は -1..1 で保持。
    //  left  : y(上下)=アーム, x(左右)=旋回
    //  right : y(上下)=ブーム, x(左右)=バケット
    // =========================================================
    const input = { lx: 0, ly: 0, rx: 0, ry: 0 };

    function setupStick(stickId, knobId, onChange) {
      const stick = document.getElementById(stickId);
      const knob  = document.getElementById(knobId);
      let active = false;
      let pid = null;
      const maxR = 44; // ノブ可動半径(px)

      function center() {
        const r = stick.getBoundingClientRect();
        return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
      }
      function move(clientX, clientY) {
        const c = center();
        let dx = clientX - c.x;
        let dy = clientY - c.y;
        const dist = Math.hypot(dx, dy);
        if (dist > maxR) { dx *= maxR / dist; dy *= maxR / dist; }
        knob.style.transform = `translate(${dx}px, ${dy}px)`;
        knob.style.background = 'rgba(255,235,150,0.95)';
        // 正規化: 右+ / 下+ → 必要に応じて呼び出し側で反転
        onChange(dx / maxR, dy / maxR);
      }
      function release() {
        active = false; pid = null;
        knob.style.transform = 'translate(0,0)';
        knob.style.background = 'rgba(255,255,255,0.85)';
        onChange(0, 0);
      }

      // Pointer Events（タッチ・マウス両対応）
      stick.addEventListener('pointerdown', (e) => {
        active = true; pid = e.pointerId;
        stick.setPointerCapture(pid);
        move(e.clientX, e.clientY);
        e.preventDefault();
      });
      stick.addEventListener('pointermove', (e) => {
        if (!active || e.pointerId !== pid) return;
        move(e.clientX, e.clientY);
        e.preventDefault();
      });
      const end = (e) => {
        if (e.pointerId !== pid) return;
        release();
        e.preventDefault();
      };
      stick.addEventListener('pointerup', end);
      stick.addEventListener('pointercancel', end);
      stick.addEventListener('lostpointercapture', () => { if (active) release(); });
    }

    setupStick('stickLeft', 'knobLeft', (x, y) => {
      input.lx = x;   // 旋回
      input.ly = y;   // アーム
    });
    setupStick('stickRight', 'knobRight', (x, y) => {
      input.rx = x;   // バケット
      input.ry = y;   // ブーム
    });

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

    function updateJoints(dt) {
      // 旋回（左レバー左右）: 左に倒す(x<0)→反時計回り(+Y)
      joints.swing.value -= input.lx * joints.swing.speed * dt;
      // 角度ラップ
      if (joints.swing.value > Math.PI)  joints.swing.value -= Math.PI * 2;
      if (joints.swing.value < -Math.PI) joints.swing.value += Math.PI * 2;

      // アーム（左レバー上下）: 上に倒す(y<0)→伸ばす(角度を小さく)
      joints.arm.value = clamp(joints.arm.value + input.ly * joints.arm.speed * dt, joints.arm.min, joints.arm.max);

      // ブーム（右レバー上下）: 上に倒す(y<0)→ブーム上げ(値を小さく=先端が上)
      joints.boom.value = clamp(joints.boom.value + input.ry * joints.boom.speed * dt, joints.boom.min, joints.boom.max);

      // バケット（右レバー左右）: 右(x>0)→開く(角度小さく), 左→閉じる(掬う)
      joints.bucket.value = clamp(joints.bucket.value - input.rx * joints.bucket.speed * dt, joints.bucket.min, joints.bucket.max);

      applyJoints();
    }

    // =========================================================
    //  掘削・排土（地形変形＋バケット積載）
    // =========================================================
    const LOAD_CAP   = 1.0;     // バケット容量（正規化）
    const DIG_RADIUS = 1.5;     // 掘削ブラシ半径
    let   bucketLoad = 0;       // 現在の積載量 0..1
    const _tip = new THREE.Vector3();
    let   fieldChanged = false; // この変形で頂点が動いたか
    let   normAccum = 0;        // 法線再計算の間引き用

    // 刃先まわりの頂点を tipY まで下げ、削った分を積載量へ
    function digBrush(cx, cz, tipY, dt) {
      const target = Math.max(tipY, DIG_MIN);
      const rad = Math.ceil(DIG_RADIUS / CELL);
      const ixc = Math.round((cx + FIELD_HW) / CELL);
      const izc = Math.round((FIELD_HW + cz) / CELL);
      const rate = 3.2 * dt; // 1フレームの最大降下量
      let changed = false;
      for (let dz = -rad; dz <= rad; dz++) {
        for (let dx = -rad; dx <= rad; dx++) {
          if (bucketLoad >= LOAD_CAP) return changed;
          const ix = ixc + dx, iy = izc + dz;
          if (ix < 0 || ix > FIELD_SEG || iy < 0 || iy > FIELD_SEG) continue;
          const wx = ix * CELL - FIELD_HW;
          const wz = iy * CELL - FIELD_HW;
          const d = Math.hypot(wx - cx, wz - cz);
          if (d > DIG_RADIUS) continue;
          const idx = iy * (FIELD_SEG + 1) + ix;
          const h = fieldPos.getY(idx);
          if (h <= target + 0.001) continue;
          const fall = 1 - d / DIG_RADIUS;
          const lower = Math.min(h - target, rate * (0.4 + 0.6 * fall));
          if (lower <= 0) continue;
          const nh = h - lower;
          fieldPos.setY(idx, nh);
          setVertColor(idx, nh);
          bucketLoad = Math.min(LOAD_CAP, bucketLoad + lower * 0.16);
          changed = true;
        }
      }
      return changed;
    }

    // 刃先直下に盛土（排土）
    function pileBrush(cx, cz, amount) {
      const R = DIG_RADIUS + 0.5;
      const rad = Math.ceil(R / CELL);
      const ixc = Math.round((cx + FIELD_HW) / CELL);
      const izc = Math.round((FIELD_HW + cz) / CELL);
      const rise = amount * 2.2;
      let changed = false;
      for (let dz = -rad; dz <= rad; dz++) {
        for (let dx = -rad; dx <= rad; dx++) {
          const ix = ixc + dx, iy = izc + dz;
          if (ix < 0 || ix > FIELD_SEG || iy < 0 || iy > FIELD_SEG) continue;
          const wx = ix * CELL - FIELD_HW;
          const wz = iy * CELL - FIELD_HW;
          const d = Math.hypot(wx - cx, wz - cz);
          if (d > R) continue;
          const idx = iy * (FIELD_SEG + 1) + ix;
          const h = fieldPos.getY(idx);
          const fall = 1 - d / R;
          const nh = Math.min(PILE_MAX, h + rise * fall * fall);
          if (nh - h < 0.0005) continue;
          fieldPos.setY(idx, nh);
          setVertColor(idx, nh);
          changed = true;
        }
      }
      return changed;
    }

    function updateSoilVisual() {
      if (bucketLoad > 0.02) {
        soilInBucket.visible = true;
        const s = 0.35 + 0.65 * bucketLoad;
        soilInBucket.scale.set(0.7 + 0.3 * bucketLoad, s, 0.7 + 0.3 * bucketLoad);
      } else {
        soilInBucket.visible = false;
      }
      const fill = document.getElementById('loadFill');
      if (fill) fill.style.width = (bucketLoad * 100).toFixed(0) + '%';
    }

    function updateDigging(dt) {
      bucketTip.getWorldPosition(_tip);
      const groundH = heightAtWorld(_tip.x, _tip.z);
      const penetrating = _tip.y < groundH - 0.02;
      // バケット: value大=閉じる(掬う) / value小=開く(排土)
      const isOpen = joints.bucket.value < 0.15;

      let changed = false;
      if (penetrating && bucketLoad < LOAD_CAP && !isOpen) {
        changed = digBrush(_tip.x, _tip.z, _tip.y, dt);
      } else if (isOpen && bucketLoad > 0 && _tip.y > groundH + 0.05) {
        const drop = Math.min(bucketLoad, dt * 0.7);
        bucketLoad -= drop;
        changed = pileBrush(_tip.x, _tip.z, drop);
      }

      updateSoilVisual();

      if (changed) {
        fieldPos.needsUpdate = true;
        colAttr.needsUpdate = true;
        fieldChanged = true;
      }
      // 法線の再計算は重いので ~20Hz に間引く
      normAccum += dt;
      if (fieldChanged && normAccum > 0.05) {
        fieldGeo.computeVertexNormals();
        normAccum = 0;
        fieldChanged = false;
      }
    }

    // ===== リサイズ対応 =====
    function resize() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      renderer.setSize(w, h, false);
      renderer.domElement.style.width = w + 'px';
      renderer.domElement.style.height = h + 'px';
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }
    window.addEventListener('resize', resize);
    window.addEventListener('orientationchange', () => setTimeout(resize, 200));
    resize();

    // ===== メインループ =====
    const clock = new THREE.Clock();
    function animate() {
      const dt = Math.min(clock.getDelta(), 0.05);
      updateJoints(dt);
      updateHydraulics();
      updateDigging(dt);
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
